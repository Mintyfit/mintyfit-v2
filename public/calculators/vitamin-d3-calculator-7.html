<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; font-src 'self' data:;">
    <title>Vitamin D3 Calculator</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        #root {
            width: 100%;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
const { useState, useEffect } = React;

const SunIcon = () => (
  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="12" cy="12" r="4"/>
    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
  </svg>
);

const VitaminD3Calculator = () => {
  const [age, setAge] = useState(35);
  const [skinTone, setSkinTone] = useState('medium');
  const [sunExposure, setSunExposure] = useState('limited');
  const [bmi, setBmi] = useState('normal');
  const [conditions, setConditions] = useState([]);
  const [currentSupp, setCurrentSupp] = useState(0);
  const [result, setResult] = useState(null);

  const skinOptions = [
    { value: 'very_light', label: 'Very light (type I–II, burns easily)' },
    { value: 'light', label: 'Light (type III, tans with effort)' },
    { value: 'medium', label: 'Medium (type IV, tans easily)' },
    { value: 'dark', label: 'Dark (type V–VI, rarely burns)' },
  ];

  const sunOptions = [
    { value: 'none', label: 'Minimal / indoor lifestyle' },
    { value: 'limited', label: 'Limited (< 15 min/day outdoors)' },
    { value: 'moderate', label: 'Moderate (15–30 min/day outdoor)' },
    { value: 'good', label: 'Good (30–60 min/day in sun)' },
    { value: 'high', label: 'High (> 1 hr/day in strong sun)' },
  ];

  const bmiOptions = [
    { value: 'under', label: 'Underweight (BMI < 18.5)' },
    { value: 'normal', label: 'Normal weight (BMI 18.5–24.9)' },
    { value: 'over', label: 'Overweight (BMI 25–29.9)' },
    { value: 'obese', label: 'Obese (BMI ≥ 30)' },
  ];

  const conditionOptions = [
    { value: 'osteoporosis', label: 'Osteoporosis / low bone density' },
    { value: 'malabsorption', label: 'Malabsorption (Crohn\'s, coeliac, bariatric surgery)' },
    { value: 'kidney', label: 'Chronic kidney disease' },
    { value: 'liver', label: 'Liver disease' },
    { value: 'immune', label: 'Immune condition (MS, lupus, rheumatoid arthritis)' },
    { value: 'depression', label: 'Depression / low mood (possible link)' },
  ];

  const toggleCondition = (val) => {
    setConditions(prev =>
      prev.includes(val) ? prev.filter(c => c !== val) : [...prev, val]
    );
    setResult(null);
  };

  const calculate = () => {
    const ageNum = parseInt(age);
    if (!ageNum || ageNum < 1) return;

    // Base RDA by age
    let base = 600; // IU — general adult RDA (Endocrine Society)
    if (ageNum >= 70) base = 800;
    if (ageNum < 1) base = 400;
    if (ageNum < 12) base = 600;

    // Skin tone: darker skin needs more sun / supplementation
    const skinAdd = { very_light: 0, light: 200, medium: 400, dark: 700 };
    base += skinAdd[skinTone] || 0;

    // Sun exposure (less sun = more supplement needed)
    const sunAdd = { none: 1000, limited: 600, moderate: 300, good: 100, high: 0 };
    base += sunAdd[sunExposure] || 0;

    // BMI: adipose tissue sequesters D3
    const bmiAdd = { under: -100, normal: 0, over: 300, obese: 600 };
    base += bmiAdd[bmi] || 0;

    // Conditions
    const condAdd = { osteoporosis: 400, malabsorption: 600, kidney: 200, liver: 300, immune: 400, depression: 200 };
    conditions.forEach(c => { base += condAdd[c] || 0; });

    // Round to nearest 200
    base = Math.round(base / 200) * 200;
    // Clamp to safe upper range (UL is 4000 IU for general population, 10000 for clinical)
    base = Math.min(base, 4000);
    base = Math.max(base, 400);

    // Subtract current supplement (floor at 0)
    const additionalNeeded = Math.max(0, base - parseInt(currentSupp || 0));

    // mcg equivalent (1 IU vit D = 0.025 mcg)
    const mcg = (base * 0.025).toFixed(1);

    let riskLevel = 'Low';
    let riskColor = 'green';
    if (base >= 2000) { riskLevel = 'Moderate–High'; riskColor = 'orange'; }
    else if (base >= 1000) { riskLevel = 'Moderate'; riskColor = 'yellow'; }

    setResult({ iu: base, mcg, additionalNeeded, riskLevel, riskColor });
  };

  useEffect(() => {
    const notify = () => {
      const h = document.documentElement.scrollHeight;
      window.parent.postMessage({ type: 'resize', height: h }, '*');
    };
    setTimeout(notify, 100);
    setTimeout(notify, 500);
    setTimeout(notify, 1000);
    const observer = new MutationObserver(notify);
    observer.observe(document.body, { childList: true, subtree: true, attributes: true });
    return () => observer.disconnect();
  }, [result]);

  const riskColorMap = {
    green: 'text-green-700 bg-green-50',
    yellow: 'text-yellow-700 bg-yellow-50',
    orange: 'text-orange-700 bg-orange-50',
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-amber-50 to-yellow-50 p-4 sm:p-6">
      <div className="max-w-xl mx-auto">

        {/* Header */}
        <div className="text-center mb-6">
          <div className="inline-flex items-center justify-center w-14 h-14 rounded-full bg-amber-100 mb-3">
            <span className="text-amber-500"><SunIcon /></span>
          </div>
          <h1 className="text-2xl font-bold text-gray-800">Vitamin D3 Intake Calculator</h1>
          <p className="text-gray-500 text-sm mt-1">Personalised supplementation estimate based on your profile</p>
        </div>

        {/* Card */}
        <div className="bg-white rounded-2xl shadow-md p-6 space-y-5">

          {/* Age */}
          <div>
            <label className="block text-sm font-semibold text-gray-700 mb-2">Age (years)</label>
            <input
              type="number"
              min="1"
              max="110"
              value={age}
              onChange={e => { setAge(e.target.value); setResult(null); }}
              className="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-gray-800 focus:outline-none focus:ring-2 focus:ring-amber-300"
              placeholder="e.g. 35"
            />
          </div>

          {/* Skin tone */}
          <div>
            <label className="block text-sm font-semibold text-gray-700 mb-2">Skin Tone (Fitzpatrick scale)</label>
            <select
              value={skinTone}
              onChange={e => { setSkinTone(e.target.value); setResult(null); }}
              className="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-gray-800 focus:outline-none focus:ring-2 focus:ring-amber-300"
            >
              {skinOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
            </select>
          </div>

          {/* Sun exposure */}
          <div>
            <label className="block text-sm font-semibold text-gray-700 mb-2">Daily Sun Exposure</label>
            <select
              value={sunExposure}
              onChange={e => { setSunExposure(e.target.value); setResult(null); }}
              className="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-gray-800 focus:outline-none focus:ring-2 focus:ring-amber-300"
            >
              {sunOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
            </select>
          </div>

          {/* BMI range */}
          <div>
            <label className="block text-sm font-semibold text-gray-700 mb-2">Body Weight Range</label>
            <select
              value={bmi}
              onChange={e => { setBmi(e.target.value); setResult(null); }}
              className="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-gray-800 focus:outline-none focus:ring-2 focus:ring-amber-300"
            >
              {bmiOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
            </select>
          </div>

          {/* Health conditions */}
          <div>
            <label className="block text-sm font-semibold text-gray-700 mb-2">Health Conditions (select all that apply)</label>
            <div className="space-y-2">
              {conditionOptions.map(o => (
                <label key={o.value} className="flex items-start gap-3 cursor-pointer group">
                  <input
                    type="checkbox"
                    checked={conditions.includes(o.value)}
                    onChange={() => toggleCondition(o.value)}
                    className="mt-0.5 accent-amber-500"
                  />
                  <span className="text-sm text-gray-700 group-hover:text-gray-900">{o.label}</span>
                </label>
              ))}
            </div>
          </div>

          {/* Current supplement */}
          <div>
            <label className="block text-sm font-semibold text-gray-700 mb-2">Current Vitamin D3 Supplement (IU/day, 0 if none)</label>
            <input
              type="number"
              min="0"
              max="10000"
              step="200"
              value={currentSupp}
              onChange={e => { setCurrentSupp(e.target.value); setResult(null); }}
              className="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-gray-800 focus:outline-none focus:ring-2 focus:ring-amber-300"
              placeholder="e.g. 1000"
            />
          </div>

          {/* Button */}
          <button
            onClick={calculate}
            className="w-full bg-amber-500 hover:bg-amber-600 text-white font-semibold py-3 rounded-xl transition-colors text-base"
          >
            Calculate My Vitamin D3 Needs
          </button>

          {/* Results */}
          {result && (
            <div className="mt-2 bg-amber-50 rounded-xl p-5 space-y-4">
              <h2 className="text-center text-lg font-bold text-amber-800">Your Estimated Daily Target</h2>
              <div className="grid grid-cols-2 gap-3">
                <div className="bg-white rounded-xl p-4 text-center shadow-sm col-span-2">
                  <div className="text-4xl font-extrabold text-amber-500">{result.iu.toLocaleString()}</div>
                  <div className="text-sm text-gray-500 mt-1 font-medium">IU / day total intake</div>
                  <div className="text-xs text-gray-400 mt-0.5">({result.mcg} mcg)</div>
                </div>
                <div className="bg-white rounded-xl p-4 text-center shadow-sm">
                  <div className="text-2xl font-extrabold text-orange-500">{result.additionalNeeded.toLocaleString()}</div>
                  <div className="text-xs text-gray-500 mt-1 font-medium">Additional IU from supplement</div>
                </div>
                <div className={`rounded-xl p-4 text-center shadow-sm ${riskColorMap[result.riskColor]}`}>
                  <div className="text-lg font-bold">{result.riskLevel}</div>
                  <div className="text-xs mt-1 font-medium opacity-80">Deficiency risk level</div>
                </div>
              </div>
              {result.iu >= 2000 && (
                <div className="bg-orange-50 border border-orange-200 rounded-lg p-3 text-xs text-orange-800">
                  ⚠️ At doses above 2,000 IU/day, consult your doctor or get a blood test (25-OH-D) before starting or increasing supplementation.
                </div>
              )}
              <p className="text-xs text-gray-500 text-center leading-relaxed">
                Estimates are based on population guidelines. Blood level testing is the only way to confirm your actual Vitamin D status.
              </p>
            </div>
          )}
        </div>

        {/* Info */}
        <div className="mt-5 bg-white rounded-2xl shadow-sm p-5">
          <h3 className="font-bold text-gray-700 mb-3 text-sm uppercase tracking-wide">Why Vitamin D3 Matters</h3>
          <ul className="space-y-2 text-sm text-gray-600">
            <li className="flex gap-2"><span className="text-amber-500 font-bold">•</span> Supports calcium absorption and bone mineralisation.</li>
            <li className="flex gap-2"><span className="text-amber-500 font-bold">•</span> Regulates immune function — low levels linked to more frequent illness.</li>
            <li className="flex gap-2"><span className="text-amber-500 font-bold">•</span> Over 40% of adults worldwide are Vitamin D deficient.</li>
            <li className="flex gap-2"><span className="text-amber-500 font-bold">•</span> Darker skin requires significantly longer sun exposure to produce D3.</li>
            <li className="flex gap-2"><span className="text-amber-500 font-bold">•</span> Take D3 with a meal containing fat — it is fat-soluble.</li>
          </ul>
        </div>

        <p className="text-center text-xs text-gray-400 mt-4">
          Powered by <span className="font-semibold text-amber-400">MintyFit</span> · For informational purposes only · Not medical advice
        </p>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<VitaminD3Calculator />);
    </script>
</body>
</html>
